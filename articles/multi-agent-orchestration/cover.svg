<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Multi-agent orchestration illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1ecff"/>
      <stop offset="100%" stop-color="#e9fbf6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="650" y="90" width="300" height="140" rx="22" fill="#fff" stroke="#d9d3ef" stroke-width="3"/>
  <text x="800" y="170" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial" font-size="38" fill="#443f64">Planner</text>

  <rect x="230" y="360" width="300" height="160" rx="22" fill="#fff" stroke="#cbe7d8" stroke-width="3"/>
  <text x="380" y="452" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial" font-size="38" fill="#2a6048">Executor</text>

  <rect x="1070" y="360" width="300" height="160" rx="22" fill="#fff" stroke="#cbe7d8" stroke-width="3"/>
  <text x="1220" y="452" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial" font-size="38" fill="#2a6048">Critic</text>

  <rect x="620" y="660" width="360" height="120" rx="22" fill="#fff" stroke="#d9d3ef" stroke-width="3"/>
  <text x="800" y="734" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial" font-size="34" fill="#443f64">Shared State</text>

  <line x1="800" y1="230" x2="440" y2="360" stroke="#7b6ac8" stroke-width="7" stroke-linecap="round"/>
  <line x1="800" y1="230" x2="1160" y2="360" stroke="#7b6ac8" stroke-width="7" stroke-linecap="round"/>
  <line x1="530" y1="440" x2="1070" y2="440" stroke="#2f9f78" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 12"/>
  <line x1="380" y1="520" x2="680" y2="660" stroke="#7b6ac8" stroke-width="7" stroke-linecap="round"/>
  <line x1="1220" y1="520" x2="920" y2="660" stroke="#7b6ac8" stroke-width="7" stroke-linecap="round"/>

  <text x="800" y="840" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial" font-size="30" fill="#4e5d6f">Structured handoffs beat clever prompts</text>
